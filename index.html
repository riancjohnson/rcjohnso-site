<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rcjohnso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a; --fg: #e8e6e2; --muted: #555; --border: #1e1e1e; --grid-gap: 3px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--fg); font-family: 'Inconsolata', monospace; font-weight: 300; }
    header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 22px 24px 18px; gap: 10px; }
    .logo { font-family: 'IM Fell English', serif; font-style: italic; font-size: 4.2rem; letter-spacing: 0.03em; color: var(--fg); text-decoration: none; line-height: 1; }
    .header-bottom { width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
    .social-header { position: absolute; right: 0; display: flex; gap: 14px; align-items: center; }
    nav { display: flex; gap: 0; }
    nav a { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; color: var(--fg); padding: 5px 14px; border: 1px solid var(--border); border-right: none; transition: background 0.2s, color 0.2s; }
    nav a:first-child { border-left: 1px solid var(--border); }
    nav a:last-child  { border-right: 1px solid var(--border); }
    nav a:hover { background: var(--fg); color: #0a0a0a; }
    .social-header a { color: var(--muted); display: flex; transition: color 0.2s; }
    .social-header a:hover { color: var(--fg); }
    .social-header svg { width: 14px; height: 14px; fill: currentColor; }
    .hero-wrap { width: 100%; max-width: 1000px; margin: 0 auto; padding: 28px 24px 0; }
    .hero { width: 100%; aspect-ratio: 776 / 526; overflow: hidden; background: #111; }
    .hero-img { width: 100%; height: 100%; background-size: cover; background-position: center; transition: transform 0.7s ease; }
    .hero:hover .hero-img { transform: scale(1.013); }
    .section-label { max-width: 820px; margin: 36px auto 0; padding: 0 24px 12px; display: flex; align-items: center; gap: 16px; }
    .section-label span { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .grid-wrap { max-width: 820px; margin: 0 auto; padding: 0 24px 60px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--grid-gap); }
    .grid-item { aspect-ratio: 1; overflow: hidden; cursor: pointer; background: #111; }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s ease, filter 0.3s ease; filter: grayscale(15%); }
    .grid-item:hover img { transform: scale(1.06); filter: grayscale(0%); }
    .lightbox { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; padding: 20px; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; display: block; }
    .lightbox-close { position: fixed; top: 18px; right: 24px; font-size: 1.6rem; color: var(--fg); cursor: pointer; background: none; border: none; opacity: 0.5; transition: opacity 0.2s; }
    .lightbox-close:hover { opacity: 1; }
    .lb-prev, .lb-next { position: fixed; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--fg); font-size: 2.4rem; cursor: pointer; opacity: 0.35; transition: opacity 0.2s; padding: 10px; }
    .lb-prev:hover, .lb-next:hover { opacity: 1; }
    .lb-prev { left: 16px; } .lb-next { right: 16px; }
    footer { border-top: 1px solid var(--border); padding: 16px 24px; text-align: center; font-size: 0.6rem; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; }
    header, .hero-wrap, .section-label, .grid-wrap { opacity: 0; animation: fadeUp 0.6s ease forwards; }
    header { animation-delay: 0.0s; } .hero-wrap { animation-delay: 0.1s; } .section-label { animation-delay: 0.22s; } .grid-wrap { animation-delay: 0.32s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 520px) {
      header { padding: 14px 14px 12px; } .logo { font-size: 3rem; }
      nav a { padding: 5px 9px; font-size: 0.62rem; }
      .hero-wrap, .grid-wrap, .section-label { padding-left: 14px; padding-right: 14px; }
      .grid { grid-template-columns: repeat(3, 1fr); gap: 2px; }
      .social-header { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="#">rcjohnso</a>
    <div class="header-bottom">
      <nav>
        <a href="https://vimeo.com/rcjohnso" target="_blank" rel="noopener">video</a>
        <a href="scripts.html">scripts</a>
      </nav>
      <div class="social-header">
        <a href="https://vimeo.com/rcjohnso" target="_blank" rel="noopener" title="Vimeo"><svg viewBox="0 0 24 24"><path d="M23.977 6.416c-.105 2.338-1.739 5.543-4.894 9.609-3.268 4.247-6.026 6.37-8.29 6.37-1.409 0-2.578-1.294-3.553-3.881L5.322 12.91C4.603 10.322 3.834 9.03 3.01 9.03c-.179 0-.806.378-1.881 1.132L0 8.477c1.185-1.044 2.351-2.084 3.501-3.128C5.08 3.914 6.266 3.16 7.055 3.09c1.847-.174 2.982 1.083 3.401 3.773.449 2.906.766 4.711.943 5.423.522 2.379 1.098 3.559 1.733 3.559.489 0 1.226-.772 2.209-2.315.982-1.543 1.504-2.717 1.568-3.535.135-1.338-.385-2.008-1.568-2.008-.559 0-1.134.126-1.733.382 1.15-3.757 3.35-5.581 6.6-5.472 2.406.074 3.542 1.629 3.4 4.619z"/></svg></a>
        <a href="https://www.instagram.com/riancjohnson/" target="_blank" rel="noopener" title="Instagram"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>
        <a href="https://twitter.com/rianjohnson" target="_blank" rel="noopener" title="Twitter"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.265 5.638L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg></a>
      </div>
    </div>
  </header>

  <div class="hero-wrap">
    <div class="hero">
      <a href="https://www.youtube.com/watch?v=zGbZCgHQ9m8" target="_blank" rel="noopener">
        <div class="hero-img" id="heroImg" role="img" aria-label="Hero photo"></div>
      </a>
    </div>
  </div>

  <div class="section-label" id="photos"><span>photos</span></div>
  <div class="grid-wrap">
    <div class="grid" id="photoGrid"></div>
  </div>

  <footer>&#169; rcjohnso &#8212; all rights reserved</footer>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lbClose" aria-label="Close">&#10005;</button>
    <button class="lb-prev" id="lbPrev" aria-label="Previous">&#8249;</button>
    <img id="lbImg" src="" alt="" />
    <button class="lb-next" id="lbNext" aria-label="Next">&#8250;</button>
  </div>

  <script>
    // Images are served directly from GitHub's CDN — not through Netlify.
    // This keeps your Netlify bandwidth usage near zero.
    const REPO   = 'riancjohnson/rcjohnso-site';
    const BRANCH = 'main';
    const RAW    = 'https://raw.githubusercontent.com/' + REPO + '/' + BRANCH + '/';
    const API    = 'https://api.github.com/repos/' + REPO + '/contents/';

    // ── Hero: first image in the hero/ folder, served from GitHub CDN ──
    async function loadHero() {
      try {
        const res = await fetch(API + 'hero?per_page=10');
        if (!res.ok) throw new Error();
        const files = await res.json();
        const file = files.find(f => f.type === 'file' && /\.(jpe?g|png|gif|webp)$/i.test(f.name));
        if (file) {
          document.getElementById('heroImg').style.backgroundImage =
            'url("' + RAW + 'hero/' + encodeURIComponent(file.name) + '")';
        }
      } catch (_) {}
    }

    // ── Grid: all images in images/ folder, served from GitHub CDN ──
    async function loadPhotos() {
      const grid = document.getElementById('photoGrid');
      let photos = [];
      try {
        const res = await fetch(API + 'images?per_page=1000');
        if (!res.ok) throw new Error();
        const data = await res.json();
        photos = data
          .filter(f => f.type === 'file' && /\.(jpe?g|png|gif|webp)$/i.test(f.name))
          .map(f => f.name)
          .sort().reverse();
      } catch (_) {
        grid.innerHTML = '<p style="color:#555;font-size:0.75rem;padding:20px 0;">Unable to load photos.</p>';
        return;
      }
      photos.forEach(filename => {
        const div = document.createElement('div');
        div.className = 'grid-item';
        const img = document.createElement('img');
        img.loading = 'lazy';
        // Load directly from GitHub raw CDN — bypasses Netlify bandwidth entirely
        img.src = RAW + 'images/' + encodeURIComponent(filename);
        img.alt = '';
        div.appendChild(img);
        grid.appendChild(div);
      });
      initLightbox();
    }

    loadHero();
    loadPhotos();

    // ── Lightbox ──
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    let current = 0, items = [];
    function initLightbox() {
      items = Array.from(document.querySelectorAll('.grid-item img'));
      items.forEach((img, i) => img.parentElement.addEventListener('click', () => openLb(i)));
    }
    function openLb(idx) { current = idx; lbImg.src = items[idx].src; lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
    function closeLb() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    function showPrev() { openLb((current - 1 + items.length) % items.length); }
    function showNext() { openLb((current + 1) % items.length); }
    document.getElementById('lbClose').addEventListener('click', closeLb);
    document.getElementById('lbPrev').addEventListener('click', showPrev);
    document.getElementById('lbNext').addEventListener('click', showNext);
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLb();
      if (e.key === 'ArrowLeft') showPrev();
      if (e.key === 'ArrowRight') showNext();
    });
  </script>
</body>
</html>
