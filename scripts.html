<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rcjohnso / scripts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── DESIGN TOKENS ─── */
    :root {
      --bg:     #0a0a0a;
      --fg:     #e8e6e2;
      --muted:  #555;
      --border: #1e1e1e;
      --dim:    #2a2a2a;
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inconsolata', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER (identical to index.html) ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 22px 24px 18px;
      gap: 10px;
    }
    .logo {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 4.2rem;
      letter-spacing: 0.03em;
      color: var(--fg);
      text-decoration: none;
      line-height: 1;
    }
    .header-bottom {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .social-header {
      position: absolute;
      right: 0;
      display: flex;
      gap: 14px;
      align-items: center;
    }
    nav { display: flex; gap: 0; }
    nav a {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--fg);
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-right: none;
      transition: background 0.2s, color 0.2s;
    }
    nav a:first-child { border-left: 1px solid var(--border); }
    nav a:last-child  { border-right: 1px solid var(--border); }
    nav a.active,
    nav a:hover { background: var(--fg); color: #0a0a0a; }
    .social-header a { color: var(--muted); display: flex; transition: color 0.2s; }
    .social-header a:hover { color: var(--fg); }
    .social-header svg { width: 14px; height: 14px; fill: currentColor; }

    /* ─── MAIN CONTENT ─── */
    main {
      flex: 1;
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding: 52px 24px 80px;
    }

    /* ─── INTRO LINE ─── */
    .intro {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 52px;
      font-style: italic;
    }

    /* ─── SCRIPT ENTRIES ─── */
    .script-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .script-entry {
      border-top: 1px solid var(--border);
      padding: 28px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 24px;
      transition: border-color 0.2s;
    }
    .script-entry:last-child {
      border-bottom: 1px solid var(--border);
    }

    .script-title {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1.9rem;
      letter-spacing: 0.02em;
      color: var(--fg);
      line-height: 1.1;
    }

    .script-links {
      display: flex;
      flex-direction: column;
      gap: 7px;
      align-items: flex-end;
      padding-top: 6px;
    }

    .script-links a {
      font-size: 0.64rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--muted);
      padding: 4px 10px;
      border: 1px solid var(--dim);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .script-links a:hover {
      color: #0a0a0a;
      background: var(--fg);
      border-color: var(--fg);
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ─── ENTRANCE ANIMATION ─── */
    header, main {
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }
    header { animation-delay: 0.0s; }
    main   { animation-delay: 0.12s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 520px) {
      header { padding: 14px 14px 12px; }
      .logo  { font-size: 3rem; }
      nav a  { padding: 5px 9px; font-size: 0.62rem; }
      .social-header { display: none; }
      main   { padding: 36px 14px 60px; }
      .script-entry {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .script-links { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
    }
  </style>
</head>
